name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            artifact_name: vinrouge
            asset_name: vinrouge-linux-x86_64
            archive_ext: tar.gz

          - target: x86_64-apple-darwin
            os: macos-13
            artifact_name: vinrouge
            asset_name: vinrouge-macos-x86_64
            archive_ext: tar.gz

          - target: aarch64-apple-darwin
            os: macos-13
            artifact_name: vinrouge
            asset_name: vinrouge-macos-aarch64
            archive_ext: tar.gz

          - target: x86_64-pc-windows-msvc
            os: windows-2022
            artifact_name: vinrouge.exe
            asset_name: vinrouge-windows-x86_64
            archive_ext: zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # tiberius uses native-tls -> openssl on Linux.
      # macOS uses security-framework and Windows uses schannel — no extra setup needed there.
      - name: Install OpenSSL dev headers (Linux only)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y pkg-config libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Linux and macOS)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Package archive (Linux and macOS)
        if: matrix.archive_ext == 'tar.gz'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} dist/
          cp README.md dist/
          cp LLM_GUIDE.md dist/
          tar -czf ${{ matrix.asset_name }}.tar.gz -C dist .

      - name: Package archive (Windows)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target\${{ matrix.target }}\release\${{ matrix.artifact_name }}" dist\
          Copy-Item README.md dist\
          Copy-Item LLM_GUIDE.md dist\
          Compress-Archive -Path dist\* -DestinationPath "${{ matrix.asset_name }}.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.${{ matrix.archive_ext }}
          if-no-files-found: error
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    if: success()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: VinRougeData ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
          fail_on_unmatched_files: true
