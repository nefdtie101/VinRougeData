name: Build Desktop App

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            os: ubuntu-22.04
            tauri_triple: x86_64-unknown-linux-gnu
            ollama_url: https://github.com/ollama/ollama/releases/latest/download/ollama-linux-amd64.tar.zst
          - platform: macos-aarch64
            os: macos-latest
            tauri_triple: aarch64-apple-darwin
            ollama_url: https://github.com/ollama/ollama/releases/latest/download/ollama-darwin.tgz
          - platform: windows-x86_64
            os: windows-latest
            tauri_triple: x86_64-pc-windows-msvc
            ollama_url: https://github.com/ollama/ollama/releases/latest/download/ollama-windows-amd64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies (webkit2gtk, etc.)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            pkg-config libssl-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: vinrouge-desktop -> target

      - name: Install trunk (for building the Leptos frontend)
        uses: jetli/trunk-action@v0.5.0
        with:
          version: "v0.21.7"

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Download and extract Ollama binary (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          mkdir -p vinrouge-desktop/binaries
          curl -L --fail "${{ matrix.ollama_url }}" -o ollama.tar.zst
          tar --zstd -xf ollama.tar.zst
          find . -path ./vinrouge-desktop -prune -o -name "ollama" -type f -print | head -1 \
            | xargs -I{} cp {} vinrouge-desktop/binaries/ollama-${{ matrix.tauri_triple }}
          chmod +x vinrouge-desktop/binaries/ollama-${{ matrix.tauri_triple }}

      - name: Download and extract Ollama binary (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p vinrouge-desktop/binaries
          curl -L --fail "${{ matrix.ollama_url }}" -o ollama.tgz
          tar -xzf ollama.tgz
          find . -path ./vinrouge-desktop -prune -o -name "ollama" -type f -print | head -1 \
            | xargs -I{} cp {} vinrouge-desktop/binaries/ollama-${{ matrix.tauri_triple }}
          chmod +x vinrouge-desktop/binaries/ollama-${{ matrix.tauri_triple }}

      - name: Download and extract Ollama binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "vinrouge-desktop\binaries"
          curl.exe -L --fail "${{ matrix.ollama_url }}" -o ollama.zip
          Expand-Archive -Path ollama.zip -DestinationPath tmp_ollama -Force
          $bin = Get-ChildItem -Path tmp_ollama -Filter "ollama.exe" -Recurse | Select-Object -First 1
          Copy-Item $bin.FullName "vinrouge-desktop\binaries\ollama-${{ matrix.tauri_triple }}.exe"
          # Copy CUDA/ROCm/AVX libs that Ollama needs for GPU inference
          $libDir = Join-Path $bin.DirectoryName "lib"
          if (Test-Path $libDir) {
            Copy-Item -Recurse -Force $libDir "vinrouge-desktop\binaries\lib"
          }

      - name: Download and bundle llama.cpp CUDA build (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # Resolve latest llama.cpp release asset for CUDA 12, Windows x64
          $headers = @{ Authorization = "Bearer $env:GITHUB_TOKEN" }
          $release = Invoke-RestMethod "https://api.github.com/repos/ggerganov/llama.cpp/releases/latest" -Headers $headers
          $asset = $release.assets |
            Where-Object { $_.name -match "^llama-b\d+-bin-win-cuda-12\.\d+-x64\.zip$" } |
            Select-Object -First 1
          if (-not $asset) {
            Write-Error "Could not find llama.cpp CUDA 12 Windows x64 asset in latest release"
            exit 1
          }
          Write-Host "Downloading $($asset.name)"
          curl.exe -L --fail $asset.browser_download_url -o llama-cuda.zip

          Expand-Archive -Path llama-cuda.zip -DestinationPath tmp_llama -Force

          # Bundle llama-server as a Tauri sidecar
          $server = Get-ChildItem -Path tmp_llama -Filter "llama-server.exe" -Recurse |
            Select-Object -First 1
          if (-not $server) {
            Write-Error "llama-server.exe not found in archive"
            exit 1
          }
          Copy-Item $server.FullName "vinrouge-desktop\binaries\llama-server-${{ matrix.tauri_triple }}.exe"

          # Copy CUDA DLLs that ship alongside llama-server into a dedicated folder
          New-Item -ItemType Directory -Force -Path "vinrouge-desktop\binaries\llama-cuda-dlls"
          Get-ChildItem -Path $server.DirectoryName -Filter "*.dll" | ForEach-Object {
            Copy-Item $_.FullName "vinrouge-desktop\binaries\llama-cuda-dlls\"
          }

      - name: Build Leptos frontend
        working-directory: vinrouge-web
        run: trunk build --release --public-url ./

      - name: Generate app icons
        working-directory: vinrouge-desktop
        run: cargo tauri icon icons/icon.png

      - name: Build desktop app
        working-directory: vinrouge-desktop
        run: cargo tauri build

      - name: Upload macOS bundle
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: VinRouge-${{ matrix.platform }}
          path: vinrouge-desktop/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Upload Linux bundle
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: VinRouge-${{ matrix.platform }}
          path: |
            vinrouge-desktop/target/release/bundle/deb/*.deb
            vinrouge-desktop/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

      - name: Upload Windows bundle
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: VinRouge-${{ matrix.platform }}
          path: vinrouge-desktop/target/release/bundle/msi/*.msi
          if-no-files-found: warn

  release:
    name: Publish GitHub Release
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Read version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' vinrouge-desktop/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Force-update 'latest' tag to current commit
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: |
          git tag -f latest
          git push origin -f latest

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('Latest Build (v{0})', steps.version.outputs.value) }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          files: artifacts/**/*
          generate_release_notes: ${{ startsWith(github.ref, 'refs/tags/') }}
