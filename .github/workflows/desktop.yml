name: Build Desktop App

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            os: ubuntu-22.04
            tauri_triple: x86_64-unknown-linux-gnu
            ollama_url: https://github.com/ollama/ollama/releases/latest/download/ollama-linux-amd64.tar.zst
          - platform: macos-aarch64
            os: macos-latest
            tauri_triple: aarch64-apple-darwin
            ollama_url: https://github.com/ollama/ollama/releases/latest/download/ollama-darwin.tgz
          - platform: windows-x86_64
            os: windows-latest
            tauri_triple: x86_64-pc-windows-msvc
            ollama_url: https://github.com/ollama/ollama/releases/latest/download/ollama-windows-amd64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies (webkit2gtk, etc.)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            pkg-config libssl-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: vinrouge-desktop -> target

      - name: Install trunk (for building the Leptos frontend)
        uses: jetli/trunk-action@v0.5.0
        with:
          version: "v0.21.7"

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Download and extract Ollama binary (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          mkdir -p vinrouge-desktop/binaries
          curl -L --fail "${{ matrix.ollama_url }}" -o ollama.tar.zst
          tar --zstd -xf ollama.tar.zst
          find . -path ./vinrouge-desktop -prune -o -name "ollama" -type f -print | head -1 \
            | xargs -I{} cp {} vinrouge-desktop/binaries/ollama-${{ matrix.tauri_triple }}
          chmod +x vinrouge-desktop/binaries/ollama-${{ matrix.tauri_triple }}

      - name: Download and extract Ollama binary (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p vinrouge-desktop/binaries
          curl -L --fail "${{ matrix.ollama_url }}" -o ollama.tgz
          tar -xzf ollama.tgz
          find . -path ./vinrouge-desktop -prune -o -name "ollama" -type f -print | head -1 \
            | xargs -I{} cp {} vinrouge-desktop/binaries/ollama-${{ matrix.tauri_triple }}
          chmod +x vinrouge-desktop/binaries/ollama-${{ matrix.tauri_triple }}

      - name: Download and extract Ollama binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "vinrouge-desktop\binaries"
          curl.exe -L --fail "${{ matrix.ollama_url }}" -o ollama.zip
          Expand-Archive -Path ollama.zip -DestinationPath tmp_ollama -Force
          $bin = Get-ChildItem -Path tmp_ollama -Filter "ollama.exe" -Recurse | Select-Object -First 1
          Copy-Item $bin.FullName "vinrouge-desktop\binaries\ollama-${{ matrix.tauri_triple }}.exe"
          # Bundle only the CUDA 12 runner — Ollama looks for lib/ollama/cuda_v12/ next to its exe.
          # Skipping ROCm/AVX/CUDA 11 keeps the installer size manageable.
          $cudaDir = Join-Path $bin.DirectoryName "lib\ollama\cuda_v12"
          if (Test-Path $cudaDir) {
            $dest = "vinrouge-desktop\binaries\lib\ollama\cuda_v12"
            New-Item -ItemType Directory -Force -Path $dest | Out-Null
            Copy-Item -Recurse -Force "$cudaDir\*" $dest
          } else {
            Write-Warning "cuda_v12 runner directory not found in Ollama archive — GPU inference may fall back to CPU"
          }


      - name: Build Leptos frontend
        working-directory: vinrouge-web
        run: trunk build --release --public-url ./

      - name: Generate app icons
        working-directory: vinrouge-desktop
        run: cargo tauri icon icons/icon.png

      # macOS + Linux: normal Tauri bundle (DMG / deb / AppImage)
      - name: Build desktop app (macOS / Linux)
        if: matrix.os != 'windows-latest'
        working-directory: vinrouge-desktop
        run: cargo tauri build

      # Windows: build the exe only, then package + stub installer manually
      - name: Build desktop app (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: vinrouge-desktop
        run: cargo build --release

      - name: Package Windows ZIP
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $stage = "vinrouge-stage"
          New-Item -ItemType Directory -Force -Path $stage

          # App binary
          Copy-Item "vinrouge-desktop\target\release\vinrouge-desktop.exe" "$stage\"

          # Ollama + CUDA runner
          Copy-Item "vinrouge-desktop\binaries\ollama-${{ matrix.tauri_triple }}.exe" "$stage\ollama.exe"
          if (Test-Path "vinrouge-desktop\binaries\lib") {
            Copy-Item -Recurse "vinrouge-desktop\binaries\lib" "$stage\"
          }

          Compress-Archive -Path "$stage\*" -DestinationPath "VinRouge-windows-x64.zip" -Force
          Write-Host "ZIP size: $([math]::Round((Get-Item VinRouge-windows-x64.zip).Length / 1MB, 1)) MB"

      - name: Build stub installer (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $iscc     = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          $version  = (Select-String '^version' vinrouge-desktop\Cargo.toml |
                       Select-Object -First 1).Line -replace '.*"(.*)".*','$1'
          $repo     = "${{ github.server_url }}/${{ github.repository }}"
          $url      = "$repo/releases/latest/download/VinRouge-windows-x64.zip"
          Write-Host "ISCC: $iscc"
          Write-Host "DownloadUrl: $url"
          Write-Host "AppVersion:  $version"
          & $iscc "/DDownloadUrl=$url" "/DAppVersion=$version" "/O." "vinrouge-desktop\installer\stub.iss"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload macOS bundle
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: VinRouge-${{ matrix.platform }}
          path: vinrouge-desktop/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Upload Linux bundle
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: VinRouge-${{ matrix.platform }}
          path: |
            vinrouge-desktop/target/release/bundle/deb/*.deb
            vinrouge-desktop/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

      - name: List Windows build outputs
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Get-ChildItem -Path . -Filter "VinRouge*" | Select-Object Name, Length

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: VinRouge-${{ matrix.platform }}
          path: |
            VinRouge-windows-x64.zip
            VinRouge-*-Setup.exe
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Read version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' vinrouge-desktop/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Force-update 'latest' tag to current commit
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: |
          git tag -f latest
          git push origin -f latest

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('Latest Build (v{0})', steps.version.outputs.value) }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          files: artifacts/**/*
          generate_release_notes: ${{ startsWith(github.ref, 'refs/tags/') }}
