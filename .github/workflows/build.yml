


on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: vinrouge
            asset_name: vinrouge-linux-x86_64

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: vinrouge
            asset_name: vinrouge-linux-aarch64
            use_cross: true

          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: vinrouge
            asset_name: vinrouge-macos-x86_64
            archive_ext: tar.gz

          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: vinrouge
            asset_name: vinrouge-macos-aarch64
            archive_ext: tar.gz

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: vinrouge.exe
            asset_name: vinrouge-windows-x86_64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for cross-compilation)
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build binary (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build binary
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package macOS binary (tar.gz preserves execute permissions)
        if: matrix.archive_ext == 'tar.gz'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} dist/
          cp README.md dist/
          cp LLM_GUIDE.md dist/
          tar -czf ${{ matrix.asset_name }}.tar.gz -C dist .

      - name: Rename binary for release (non-macOS)
        if: matrix.archive_ext != 'tar.gz'
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/${{ matrix.artifact_name }}"
          dst="${{ matrix.asset_name }}"
          cp "$src" "$dst"

      - name: Upload artifact (macOS tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.tar.gz
          if-no-files-found: error

      - name: Upload artifact (other)
        if: matrix.archive_ext != 'tar.gz'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Run on version tags and successful master pushes (not PRs)
    if: always() && !cancelled() && (startsWith(github.ref, 'refs/tags/v') || (github.ref == 'refs/heads/master' && github.event_name == 'push'))
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          # Downloads whatever artifacts were successfully uploaded; missing ones are skipped
        continue-on-error: true

      - name: Check at least one artifact exists
        run: |
          count=$(find artifacts -type f | wc -l)
          echo "Artifacts found: $count"
          if [ "$count" -eq 0 ]; then
            echo "No artifacts were built — aborting release."
            exit 1
          fi

      - name: Create versioned GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true

      - name: Update rolling 'latest' release (on master)
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest build (master)"
          prerelease: true
          files: artifacts/**/*
          body: |
            Automated build from the latest commit on `master`.
            Binaries are updated on every successful push.

            **Commit:** ${{ github.sha }}
