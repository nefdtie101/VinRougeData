<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VinRouge — Data Analysis</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        /* Global */
        --bg: #0d0a0b;
        --surface: #160f11;
        --surface-raised: #1e1316;
        --border: #3a1f25;
        --border-hover: #6b2a36;
        --accent: #8b1a2a;
        --accent-hover: #a82035;
        --accent-dim: #4a0f18;
        --text: #f0e6e8;
        --text-muted: #9a7e84;
        --text-faint: #5c4348;
        --green: #4ade80;
        --blue: #60a5fa;
        --yellow: #facc15;
        --purple: #c084fc;
        --radius: 8px;
        --radius-sm: 4px;
        --font: system-ui, -apple-system, sans-serif;
        --mono: ui-monospace, "Cascadia Code", monospace;
        /* Wine-themed projects palette */
        --w-bg:           #0d0a0b;
        --w-surface:      #160f11;
        --w-surface-2:    #1e1316;
        --w-border:       #3a1f25;
        --w-border-2:     #522530;
        --w-accent:       #8b1a2a;
        --w-accent-hover: #a82035;
        --w-accent-dim:   rgba(139,26,42,0.12);
        --w-text:         #f0e6e8;
        --w-text-2:       #c9a8ae;
        --w-text-3:       #9a7e84;
        --w-text-4:       #5c4348;
        --w-dot-active:   #c84b5e;
        --w-dot-draft:    #7b4a4f;
        --w-success:      #2e7d45;
      }

      body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        line-height: 1.6;
      }

      header {
        border-bottom: 1px solid var(--border);
        padding: 1rem 2rem;
        display: flex;
        align-items: center;
        gap: 1.5rem;
        flex-wrap: wrap;
      }

      header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: var(--accent);
      }

      header p {
        color: var(--text-muted);
        font-size: 0.875rem;
        margin-left: auto;
      }

      /* Top nav tabs */
      .top-nav {
        display: flex;
        gap: 0.25rem;
      }

      .nav-btn {
        background: none;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text-muted);
        cursor: pointer;
        font-size: 0.875rem;
        padding: 0.4rem 1rem;
        transition: all 0.15s;
      }

      .nav-btn:hover { color: var(--text); border-color: var(--text-muted); }

      .nav-btn.active {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
        font-weight: 600;
      }

      /* Ollama chat section */
      .ollama-section {
        margin-top: 1rem;
      }

      .ollama-hint {
        color: var(--text-muted);
        font-size: 0.8125rem;
        margin-bottom: 1rem;
      }

      .ollama-hint code {
        background: rgba(255,255,255,0.08);
        padding: 0.1rem 0.35rem;
        border-radius: 4px;
        font-family: var(--mono);
      }

      .ollama-config {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        margin-bottom: 1rem;
      }

      .ollama-config label {
        font-size: 0.8125rem;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .ollama-input {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-family: var(--mono);
        font-size: 0.8125rem;
        padding: 0.35rem 0.6rem;
        width: 220px;
      }

      .ollama-input:focus {
        outline: none;
        border-color: var(--accent);
      }

      .ollama-query-row {
        display: flex;
        gap: 0.75rem;
        align-items: flex-start;
        margin-bottom: 1rem;
      }

      .ollama-textarea {
        flex: 1;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-family: var(--font);
        font-size: 0.875rem;
        padding: 0.6rem 0.75rem;
        resize: vertical;
      }

      .ollama-textarea:focus {
        outline: none;
        border-color: var(--accent);
      }

      .ollama-btn {
        background: var(--accent);
        border: none;
        border-radius: var(--radius);
        color: #fff;
        cursor: pointer;
        font-size: 0.875rem;
        font-weight: 600;
        padding: 0.6rem 1.25rem;
        white-space: nowrap;
        transition: opacity 0.15s;
      }

      .ollama-btn:hover   { opacity: 0.85; }
      .ollama-btn:disabled { opacity: 0.4; cursor: not-allowed; }

      .ollama-response {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1rem;
        margin-top: 0.75rem;
      }

      .ollama-response h3 {
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 0.5rem;
      }

      .ollama-response-text {
        white-space: pre-wrap;
        font-family: var(--font);
        font-size: 0.875rem;
        line-height: 1.7;
        color: var(--text);
      }

      .ollama-error {
        color: var(--accent);
        font-size: 0.875rem;
        margin-top: 0.5rem;
      }

      main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 2rem;
      }

      /* Upload zone */
      .upload-zone {
        border: 2px dashed var(--border);
        border-radius: var(--radius);
        padding: 3rem 2rem;
        text-align: center;
        cursor: pointer;
        transition: border-color 0.2s, background 0.2s;
        margin-bottom: 1.5rem;
      }

      .upload-zone:hover,
      .upload-zone.drag-over {
        border-color: var(--accent);
        background: rgba(200, 75, 49, 0.05);
      }

      .upload-zone label {
        display: block;
        cursor: pointer;
      }

      .upload-icon {
        font-size: 2.5rem;
        margin-bottom: 0.75rem;
      }

      .upload-zone .hint {
        color: var(--text-muted);
        font-size: 0.875rem;
        margin-top: 0.5rem;
      }

      .upload-zone input[type="file"] {
        display: none;
      }

      /* Status / loading */
      .status-bar {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 0.75rem 1rem;
        margin-bottom: 1.5rem;
        font-size: 0.875rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .status-bar.loading { color: var(--blue); }
      .status-bar.error   { color: var(--accent); }

      /* Summary cards */
      .summary-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 1rem;
        margin-bottom: 2rem;
      }

      .summary-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1rem 1.25rem;
      }

      .summary-card .label {
        font-size: 0.75rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .summary-card .value {
        font-size: 2rem;
        font-weight: 700;
        margin-top: 0.25rem;
      }

      .summary-card.tables  .value { color: var(--blue); }
      .summary-card.cols    .value { color: var(--green); }
      .summary-card.rels    .value { color: var(--yellow); }
      .summary-card.flows   .value { color: var(--purple); }

      /* Sections */
      section { margin-bottom: 2rem; }

      section h2 {
        font-size: 1rem;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 0.75rem;
        padding-bottom: 0.5rem;
        border-bottom: 1px solid var(--border);
      }

      /* Table card */
      .table-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        margin-bottom: 1rem;
        overflow: hidden;
      }

      .table-card-header {
        padding: 0.75rem 1rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
        user-select: none;
      }

      .table-card-header:hover { background: rgba(255,255,255,0.03); }

      .table-name {
        font-weight: 600;
        font-family: var(--mono);
        font-size: 0.9rem;
        color: var(--blue);
      }

      .table-meta {
        font-size: 0.75rem;
        color: var(--text-muted);
        display: flex;
        gap: 1rem;
      }

      .columns-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.8125rem;
      }

      .columns-table th {
        text-align: left;
        padding: 0.5rem 1rem;
        background: rgba(255,255,255,0.03);
        color: var(--text-muted);
        font-weight: 500;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        border-top: 1px solid var(--border);
      }

      .columns-table td {
        padding: 0.4rem 1rem;
        border-top: 1px solid rgba(42,45,62,0.6);
        font-family: var(--mono);
        vertical-align: top;
      }

      .col-name { color: var(--text); }
      .col-type { color: var(--green); }
      .col-pk   { color: var(--yellow); font-size: 0.7rem; }
      .col-nullable { color: var(--text-muted); font-size: 0.7rem; }
      .col-samples {
        color: var(--text-muted);
        font-size: 0.75rem;
        max-width: 260px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* Relationship list */
      .rel-item {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 0.625rem 1rem;
        margin-bottom: 0.5rem;
        font-family: var(--mono);
        font-size: 0.8125rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .rel-from { color: var(--blue); }
      .rel-to   { color: var(--purple); }
      .rel-arrow { color: var(--text-muted); }
      .rel-type {
        margin-left: auto;
        font-size: 0.7rem;
        color: var(--text-muted);
        background: rgba(255,255,255,0.05);
        padding: 0.1rem 0.4rem;
        border-radius: 4px;
      }

      /* Workflow list */
      .workflow-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1rem;
        margin-bottom: 0.75rem;
      }

      .workflow-header {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 0.5rem;
      }

      .workflow-type {
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        padding: 0.15rem 0.5rem;
        border-radius: 4px;
        background: rgba(192, 132, 252, 0.15);
        color: var(--purple);
      }

      .workflow-confidence {
        font-size: 0.75rem;
        color: var(--text-muted);
      }

      .workflow-desc {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-bottom: 0.5rem;
      }

      .workflow-steps {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        flex-wrap: wrap;
        font-family: var(--mono);
        font-size: 0.8rem;
      }

      .workflow-step {
        background: rgba(255,255,255,0.05);
        padding: 0.15rem 0.5rem;
        border-radius: 4px;
        color: var(--text);
      }

      .step-arrow { color: var(--text-muted); }

      .empty-state {
        color: var(--text-muted);
        font-size: 0.875rem;
        font-style: italic;
        padding: 1rem 0;
      }

      /* ── Projects screen — full-height layout override ───────────────────── */
      main.projects-active {
        padding: 0;
        max-width: 100%;
        height: calc(100vh - 64px);
        overflow: hidden;
      }

      /* ── Two-panel shell ─────────────────────────────────────────────────── */
      .projects-shell {
        display: flex;
        height: 100%;
        overflow: hidden;
        background: var(--w-bg);
      }

      .projects-shell--dragging { cursor: col-resize; user-select: none; }

      /* ── Resize handle ───────────────────────────────────────────────────── */
      .proj-resize-handle {
        width: 4px;
        flex-shrink: 0;
        cursor: col-resize;
        background: var(--w-border);
        transition: background 0.15s;
        z-index: 10;
      }
      .proj-resize-handle:hover,
      .proj-resize-handle--active { background: var(--w-accent); }

      /* ── Left sidebar ─────────────────────────────────────────────────────── */
      .proj-sidebar {
        flex-shrink: 0;
        background: var(--w-surface);
        border-right: 0.5px solid var(--w-border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .proj-sidebar-header {
        padding: 14px 16px 10px;
        border-bottom: 0.5px solid var(--w-border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
      }

      .proj-sidebar-title {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--w-text-3);
      }

      .proj-add-btn {
        width: 24px; height: 24px;
        border-radius: var(--radius-sm);
        border: 0.5px solid var(--w-border-2);
        background: transparent;
        color: var(--w-text-3);
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: background 0.12s, color 0.12s, border-color 0.12s;
      }
      .proj-add-btn:hover { background: var(--w-accent-dim); color: var(--w-text); border-color: var(--w-accent); }

      .proj-search-box {
        padding: 8px 12px;
        border-bottom: 0.5px solid var(--w-border);
        position: relative;
        flex-shrink: 0;
      }

      .proj-search-icon {
        position: absolute;
        left: 22px; top: 50%;
        transform: translateY(-50%);
        color: var(--w-text-4);
        pointer-events: none;
      }

      .proj-search-input {
        width: 100%;
        background: var(--w-surface-2);
        border: 0.5px solid var(--w-border);
        border-radius: var(--radius-sm);
        padding: 5px 8px 5px 26px;
        font-size: 12px;
        color: var(--w-text);
        font-family: var(--font);
        outline: none;
      }
      .proj-search-input::placeholder { color: var(--w-text-4); }
      .proj-search-input:focus { border-color: var(--w-accent); }

      .proj-list {
        flex: 1;
        overflow-y: auto;
        padding: 6px;
      }

      .proj-list-item {
        padding: 9px 10px;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: background 0.12s;
        margin-bottom: 2px;
      }
      .proj-list-item:hover { background: var(--w-surface-2); }
      .proj-list-item.proj-list-item--active {
        background: var(--w-surface-2);
        border: 0.5px solid var(--w-border-2);
      }

      .proj-item-row1 {
        display: flex; align-items: center;
        justify-content: space-between;
        margin-bottom: 3px;
      }

      .proj-item-name {
        font-size: 13px; font-weight: 500;
        color: var(--w-text);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        max-width: 190px;
      }

      .proj-status-dot {
        width: 7px; height: 7px;
        border-radius: 50%; flex-shrink: 0;
      }
      .proj-status-dot--active { background: var(--w-dot-active); }
      .proj-status-dot--draft  { background: var(--w-dot-draft); opacity: 0.5; }

      .proj-item-meta {
        font-size: 11px;
        color: var(--w-text-4);
        font-family: var(--mono);
      }

      .proj-delete-btn {
        opacity: 0;
        background: none;
        border: none;
        cursor: pointer;
        color: var(--w-text-4);
        padding: 2px 4px;
        border-radius: var(--radius-sm);
        display: flex; align-items: center; justify-content: center;
        transition: opacity 0.12s, color 0.12s, background 0.12s;
        flex-shrink: 0;
      }
      .proj-list-item:hover .proj-delete-btn { opacity: 1; }
      .proj-delete-btn:hover { color: var(--w-accent-hover); background: var(--w-accent-dim); }

      .proj-new-btn-dashed {
        margin: 8px 12px 12px;
        padding: 8px;
        border-radius: var(--radius-sm);
        border: 1px dashed var(--w-border-2);
        background: transparent;
        cursor: pointer;
        font-size: 12px;
        color: var(--w-text-3);
        font-family: var(--font);
        display: flex; align-items: center; justify-content: center; gap: 5px;
        transition: background 0.12s, border-color 0.12s, color 0.12s;
        flex-shrink: 0;
      }
      .proj-new-btn-dashed:hover { background: var(--w-accent-dim); border-color: var(--w-accent); color: var(--w-text); }

      /* ── Right panel ─────────────────────────────────────────────────────── */
      .proj-main {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        position: relative;
        background: var(--w-bg);
      }

      .proj-status-toast {
        position: absolute;
        top: 12px; right: 16px;
        background: var(--w-surface-2);
        border: 0.5px solid var(--w-border-2);
        border-radius: var(--radius-sm);
        padding: 6px 12px;
        font-size: 12px;
        color: var(--w-text-2);
        z-index: 10;
      }

      /* ── Empty state ─────────────────────────────────────────────────────── */
      .proj-empty-state {
        flex: 1;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 12px; padding: 40px;
      }

      .proj-empty-icon {
        width: 56px; height: 56px;
        border-radius: 14px;
        background: var(--w-surface-2);
        border: 0.5px solid var(--w-border);
        display: flex; align-items: center; justify-content: center;
        color: var(--w-text-4);
        margin-bottom: 4px;
      }

      .proj-empty-title {
        font-size: 16px; font-weight: 500;
        color: var(--w-text);
      }

      .proj-empty-sub {
        font-size: 13px; color: var(--w-text-3);
        text-align: center; max-width: 300px; line-height: 1.6;
        margin-bottom: 4px;
      }

      /* ── Wizard shell ─────────────────────────────────────────────────────── */
      .wiz-container {
        flex: 1; display: flex; flex-direction: column; overflow: hidden;
      }

      /* ── Step bar ─────────────────────────────────────────────────────────── */
      .wiz-step-bar {
        display: flex; align-items: center;
        padding: 0 28px; height: 46px;
        border-bottom: 0.5px solid var(--w-border);
        background: var(--w-surface);
        flex-shrink: 0;
      }

      .wiz-step { display: flex; align-items: center; gap: 6px; }

      .wiz-step-num {
        width: 20px; height: 20px;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 10px; font-weight: 500;
        border: 0.5px solid var(--w-border-2);
        color: var(--w-text-4);
        background: var(--w-surface-2);
        flex-shrink: 0;
      }

      .wiz-step--active .wiz-step-num {
        background: var(--w-accent);
        border-color: var(--w-accent);
        color: #fff;
      }

      .wiz-step--done .wiz-step-num {
        background: var(--w-accent-dim);
        border-color: var(--w-accent);
        color: var(--w-accent-hover);
      }

      .wiz-step-label {
        font-size: 11px; color: var(--w-text-4);
        white-space: nowrap;
      }
      .wiz-step--active .wiz-step-label { color: var(--w-text); font-weight: 500; }
      .wiz-step--done  .wiz-step-label  { color: var(--w-text-3); }

      .wiz-step-line {
        flex: 1; height: 0.5px;
        background: var(--w-border);
        margin: 0 8px;
      }

      /* ── Wizard body wrap ─────────────────────────────────────────────────── */
      .wiz-body-wrap {
        flex: 1; display: flex; flex-direction: column; overflow: hidden;
      }

      .wiz-header {
        padding: 20px 28px 16px;
        border-bottom: 0.5px solid var(--w-border);
        flex-shrink: 0;
      }

      .wiz-title { font-size: 17px; font-weight: 500; color: var(--w-text); }
      .wiz-sub   { font-size: 13px; color: var(--w-text-3); margin-top: 2px; }

      .wiz-body {
        flex: 1; padding: 20px 28px;
        overflow-y: auto;
        display: flex; flex-direction: column; gap: 16px;
      }

      .wiz-section-label {
        font-size: 11px; font-weight: 500;
        text-transform: uppercase; letter-spacing: 0.07em;
        color: var(--w-text-4); margin-bottom: 8px;
      }

      .wiz-field { display: flex; flex-direction: column; gap: 4px; }

      .wiz-label { font-size: 12px; color: var(--w-text-3); }
      .wiz-req   { color: var(--w-accent-hover); font-size: 11px; }

      .wiz-input, .wiz-textarea {
        background: var(--w-surface);
        border: 0.5px solid var(--w-border-2);
        border-radius: var(--radius-sm);
        padding: 7px 10px;
        font-size: 13px; color: var(--w-text);
        font-family: var(--font); outline: none;
        transition: border-color 0.15s; width: 100%;
      }
      .wiz-input:focus, .wiz-textarea:focus {
        border-color: var(--w-accent);
        box-shadow: 0 0 0 3px rgba(139,26,42,0.12);
      }
      .wiz-input::placeholder, .wiz-textarea::placeholder { color: var(--w-text-4); }
      .wiz-textarea { resize: vertical; min-height: 72px; line-height: 1.6; }

      .wiz-two-col   { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .wiz-three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

      /* Audit type cards */
      .wiz-audit-cards { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }

      .wiz-audit-card {
        padding: 12px;
        border: 0.5px solid var(--w-border);
        border-radius: var(--radius-sm);
        cursor: pointer; transition: all 0.12s;
        background: var(--w-surface);
        text-align: center;
      }
      .wiz-audit-card:hover { border-color: var(--w-border-2); }
      .wiz-audit-card--selected {
        border-color: var(--w-accent);
        background: var(--w-accent-dim);
      }

      .wiz-audit-name { font-size: 12px; font-weight: 500; color: var(--w-text); }
      .wiz-audit-desc { font-size: 10px; color: var(--w-text-4); margin-top: 2px; }

      /* Save location row */
      .wiz-folder-row {
        display: flex; align-items: center; gap: 8px;
        padding: 6px 10px;
        background: var(--w-surface);
        border: 0.5px solid var(--w-border-2);
        border-radius: var(--radius-sm);
      }
      .wiz-folder-path {
        flex: 1; font-size: 12px; font-family: var(--mono);
        color: var(--w-text-3);
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }

      /* Standards grid */
      .wiz-standards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

      .wiz-standard-item {
        display: flex; align-items: center; gap: 8px;
        padding: 10px;
        border: 0.5px solid var(--w-border);
        border-radius: var(--radius-sm);
        cursor: pointer; transition: all 0.12s;
        background: var(--w-surface);
      }
      .wiz-standard-item:hover { border-color: var(--w-border-2); }
      .wiz-standard-item--selected { border-color: var(--w-accent); background: var(--w-accent-dim); }

      .wiz-std-chk {
        width: 16px; height: 16px; border-radius: 3px;
        border: 0.5px solid var(--w-border-2);
        background: var(--w-surface-2);
        flex-shrink: 0;
        display: flex; align-items: center; justify-content: center;
        color: #fff;
      }
      .wiz-std-chk--checked { background: var(--w-accent); border-color: var(--w-accent); }

      .wiz-std-name { font-size: 12px; font-weight: 500; color: var(--w-text); }

      .wiz-ui-note {
        font-size: 11px; color: var(--w-text-4);
        font-style: italic; padding: 8px 0 0;
      }

      /* Team */
      .wiz-members-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }

      .wiz-member-chip {
        display: flex; align-items: center; gap: 5px;
        background: var(--w-surface-2);
        border: 0.5px solid var(--w-border-2);
        border-radius: 20px;
        padding: 3px 8px 3px 10px;
        font-size: 12px; color: var(--w-text-2);
      }

      .wiz-member-remove {
        background: none; border: none; cursor: pointer;
        color: var(--w-text-4); font-size: 14px; line-height: 1;
        padding: 0; transition: color 0.12s;
      }
      .wiz-member-remove:hover { color: var(--w-accent-hover); }

      .wiz-team-row { display: flex; gap: 8px; align-items: stretch; }

      /* Notification toggle */
      .wiz-toggle-row {
        display: flex; align-items: center; justify-content: space-between;
        padding: 10px 12px;
        border: 0.5px solid var(--w-border);
        border-radius: var(--radius-sm);
        background: var(--w-surface);
      }
      .wiz-toggle-title { font-size: 12px; font-weight: 500; color: var(--w-text); }
      .wiz-toggle-sub   { font-size: 11px; color: var(--w-text-4); margin-top: 2px; }

      .wiz-toggle {
        width: 32px; height: 18px;
        border-radius: 9px;
        background: var(--w-surface-2);
        border: 0.5px solid var(--w-border-2);
        cursor: pointer; position: relative; flex-shrink: 0;
        transition: background 0.15s;
      }
      .wiz-toggle--on { background: var(--w-accent); border-color: var(--w-accent); }

      .wiz-toggle-thumb {
        width: 14px; height: 14px;
        border-radius: 50%; background: white;
        position: absolute; top: 2px; left: 2px;
        transition: left 0.15s;
      }
      .wiz-toggle--on .wiz-toggle-thumb { left: 16px; }

      /* Review step */
      .wiz-review-alert {
        display: flex; gap: 8px; align-items: flex-start;
        padding: 10px 14px;
        border-radius: var(--radius-sm);
        border: 0.5px solid var(--w-border-2);
        background: var(--w-accent-dim);
        font-size: 12px; color: var(--w-text-2);
        line-height: 1.5;
      }

      .wiz-review-card {
        background: var(--w-surface);
        border: 0.5px solid var(--w-border);
        border-radius: var(--radius);
        overflow: hidden;
      }

      .wiz-review-card-head {
        padding: 10px 14px;
        background: var(--w-surface-2);
        border-bottom: 0.5px solid var(--w-border);
        font-size: 12px; font-weight: 500; color: var(--w-text-3);
        display: flex; align-items: center; justify-content: space-between;
      }

      .wiz-review-edit {
        font-size: 11px; color: var(--w-accent-hover);
        cursor: pointer; background: none; border: none;
        font-family: var(--font); padding: 0; transition: opacity 0.12s;
      }
      .wiz-review-edit:hover { opacity: 0.75; }

      .wiz-review-grid {
        padding: 12px 14px;
        display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
      }

      .wiz-rv-label { font-size: 11px; color: var(--w-text-4); margin-bottom: 2px; }
      .wiz-rv-val   { font-size: 13px; color: var(--w-text); font-weight: 500; }

      .wiz-review-tags { display: flex; flex-wrap: wrap; gap: 5px; padding: 10px 14px; }

      .wiz-std-tag {
        font-size: 11px; padding: 3px 10px;
        border-radius: 20px;
        background: var(--w-accent-dim);
        color: var(--w-accent-hover);
        border: 0.5px solid var(--w-border-2);
        font-weight: 500;
      }

      /* ── Wizard footer ───────────────────────────────────────────────────── */
      .wiz-footer {
        padding: 12px 28px;
        border-top: 0.5px solid var(--w-border);
        background: var(--w-surface);
        display: flex; align-items: center; justify-content: space-between;
        flex-shrink: 0;
      }

      .wiz-validation-msg { font-size: 12px; color: var(--w-text-4); }

      .wiz-footer-actions { display: flex; gap: 8px; }

      /* ── Shared buttons ──────────────────────────────────────────────────── */
      .wiz-btn-primary {
        padding: 7px 18px;
        border-radius: var(--radius-sm);
        background: var(--w-accent);
        border: none; color: #fff;
        font-size: 13px; font-weight: 500;
        cursor: pointer; font-family: var(--font);
        transition: background 0.15s, transform 0.1s;
        white-space: nowrap;
      }
      .wiz-btn-primary:hover    { background: var(--w-accent-hover); }
      .wiz-btn-primary:active   { transform: scale(0.98); }
      .wiz-btn-primary:disabled { opacity: 0.35; cursor: default; transform: none; }

      .wiz-btn-ghost {
        padding: 7px 14px;
        border-radius: var(--radius-sm);
        background: transparent;
        border: 0.5px solid var(--w-border-2);
        color: var(--w-text-3);
        font-size: 13px; font-weight: 500;
        cursor: pointer; font-family: var(--font);
        transition: background 0.12s, color 0.12s;
        white-space: nowrap;
      }
      .wiz-btn-ghost:hover { background: var(--w-surface-2); color: var(--w-text); }

      /* ── Success screen ──────────────────────────────────────────────────── */
      .proj-success {
        flex: 1;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 0; padding: 40px;
      }

      .proj-success-icon {
        width: 60px; height: 60px; border-radius: 50%;
        background: rgba(46,125,69,0.15);
        border: 0.5px solid rgba(46,125,69,0.35);
        display: flex; align-items: center; justify-content: center;
        color: #4ade80;
        margin-bottom: 16px;
      }

      .proj-success-title { font-size: 18px; font-weight: 500; color: var(--w-text); margin-bottom: 8px; }
      .proj-success-sub   { font-size: 13px; color: var(--w-text-3); text-align: center; max-width: 340px; line-height: 1.7; margin-bottom: 24px; }

      .proj-success-meta {
        display: flex;
        border: 0.5px solid var(--w-border);
        border-radius: var(--radius);
        overflow: hidden; margin-bottom: 24px;
        width: 100%; max-width: 400px;
      }

      .proj-success-meta-item {
        flex: 1; padding: 10px 14px;
        border-right: 0.5px solid var(--w-border);
        background: var(--w-surface);
      }
      .proj-success-meta-item:last-child { border-right: none; }

      .proj-smi-label { font-size: 10px; color: var(--w-text-4); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
      .proj-smi-val   { font-size: 13px; font-weight: 500; color: var(--w-text); }
      .proj-smi-val--accent { color: var(--w-accent-hover); }

      /* ── Active project panel ────────────────────────────────────────────── */
      .proj-active-panel {
        flex: 1; display: flex; flex-direction: column;
        overflow-y: auto; padding: 0;
      }

      .proj-active-header {
        padding: 12px 24px;
        border-bottom: 0.5px solid var(--w-border);
        display: flex; align-items: center; gap: 12px;
        flex-shrink: 0;
        background: var(--w-surface);
      }

      .proj-active-files {
        padding: 16px 24px;
        border-bottom: 0.5px solid var(--w-border);
        flex-shrink: 0;
      }

      .proj-file-item {
        display: flex; align-items: center; gap: 8px;
        padding: 7px 0;
        border-bottom: 0.5px solid var(--w-border);
        font-size: 13px; color: var(--w-text-2);
      }
      .proj-file-item:last-child { border-bottom: none; }
      .proj-file-item svg { color: var(--w-text-4); flex-shrink: 0; }

      .proj-file-name { flex: 1; }
      .proj-file-type {
        font-size: 10px; color: var(--w-text-4);
        font-family: var(--mono);
        text-transform: uppercase;
      }

      .proj-empty-note {
        font-size: 13px; color: var(--w-text-4);
        font-style: italic; padding: 8px 0;
      }

      .proj-active-chat {
        flex: 1; display: flex; flex-direction: column;
        padding: 16px 24px;
      }

      /* ── Chat (shared) ───────────────────────────────────────────────────── */
      .chat-messages {
        flex: 1;
        overflow-y: auto;
        margin-bottom: 12px;
        display: flex; flex-direction: column;
        gap: 8px;
      }

      .chat-msg {
        padding: 8px 12px;
        border-radius: var(--radius-sm);
        font-size: 13px;
      }

      .chat-msg-user      { background: rgba(139,26,42,0.12); border: 0.5px solid rgba(139,26,42,0.2); }
      .chat-msg-assistant { background: var(--w-surface-2); border: 0.5px solid var(--w-border); }

      .chat-role {
        font-size: 10px; font-weight: 600;
        text-transform: uppercase; letter-spacing: 0.05em;
        color: var(--w-text-4); display: block; margin-bottom: 3px;
      }

      .chat-content {
        white-space: pre-wrap; font-family: var(--font); margin: 0;
        color: var(--w-text);
      }
      /* ── SOP / Audit Plan ────────────────────────────────────────── */

      .sop-analyze-btn {
        margin-left: auto;
        background: none;
        border: 1px solid var(--w-border-2);
        border-radius: var(--radius-sm);
        color: var(--w-text-2);
        cursor: pointer;
        font-size: 11px;
        padding: 2px 8px;
        transition: all 0.15s;
        white-space: nowrap;
      }
      .sop-analyze-btn:hover { border-color: var(--w-accent); color: var(--w-accent-hover); }
      .sop-analyze-btn:disabled { opacity: 0.4; cursor: not-allowed; }

      .audit-plan { margin-top: 20px; }

      .audit-plan-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
      }
      .audit-plan-title {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.06em;
        color: var(--w-text-3);
        text-transform: uppercase;
      }
      .audit-plan-badge {
        background: var(--w-accent-dim);
        border: 1px solid var(--w-border-2);
        border-radius: 10px;
        color: var(--w-accent-hover);
        font-size: 10px;
        padding: 1px 7px;
      }

      .audit-process-card {
        border: 1px solid var(--w-border);
        border-radius: var(--radius);
        margin-bottom: 8px;
        overflow: hidden;
      }
      .audit-process-card + .audit-process-card { margin-top: 0; }

      .audit-process-header {
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--w-surface-2);
        padding: 10px 14px;
        cursor: pointer;
        user-select: none;
      }
      .audit-process-header:hover { background: var(--w-surface-2); filter: brightness(1.05); }

      .audit-process-chevron {
        color: var(--w-text-3);
        font-size: 10px;
        transition: transform 0.15s;
        flex-shrink: 0;
      }
      .audit-process-chevron.open { transform: rotate(90deg); }

      .audit-process-name-wrap { flex: 1; min-width: 0; }

      .audit-process-name {
        font-size: 13px;
        font-weight: 600;
        color: var(--w-text);
        cursor: text;
      }
      .audit-process-desc {
        font-size: 11px;
        color: var(--w-text-3);
        margin-top: 1px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .audit-process-body { padding: 0; overflow-x: auto; }

      .controls-table {
        width: 100%;
        min-width: 760px;
        border-collapse: collapse;
        font-size: 12px;
      }
      .controls-table th {
        background: var(--w-surface);
        border-bottom: 1px solid var(--w-border);
        color: var(--w-text-3);
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.05em;
        padding: 6px 10px;
        text-align: left;
        text-transform: uppercase;
      }
      .controls-table td {
        border-bottom: 1px solid var(--w-border);
        padding: 6px 10px;
        vertical-align: top;
        color: var(--w-text);
      }
      .controls-table tr:last-child td { border-bottom: none; }
      .controls-table tr:hover td { background: rgba(255,255,255,0.02); }

      .ctrl-ref {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--w-text-3);
        white-space: nowrap;
        width: 52px;
      }
      .ctrl-risk {
        white-space: nowrap;
        width: 72px;
      }
      .risk-badge {
        border-radius: 10px;
        display: inline-block;
        font-size: 10px;
        font-weight: 600;
        padding: 2px 8px;
      }
      .risk-badge.high   { background: rgba(239,68,68,.15);  color: #f87171; }
      .risk-badge.medium { background: rgba(250,204,21,.12); color: #fbbf24; }
      .risk-badge.low    { background: rgba(74,222,128,.12); color: #4ade80; }

      .sop-gap-pill {
        display: inline-block;
        margin-top: 3px;
        font-size: 9px;
        font-family: var(--sans);
        font-weight: 500;
        letter-spacing: 0.02em;
        padding: 1px 5px;
        border-radius: 999px;
        background: rgba(99,102,241,.12);
        color: #818cf8;
        border: 0.5px solid rgba(99,102,241,.3);
        white-space: nowrap;
        cursor: default;
      }

      /* inline-edit: clicking a cell shows a transparent input */
      .editable-cell {
        cursor: text;
        min-width: 80px;
      }
      .editable-input, .editable-textarea {
        background: transparent;
        border: 1px solid transparent;
        border-radius: 3px;
        color: var(--w-text);
        font-family: var(--font);
        font-size: 12px;
        padding: 2px 5px;
        width: 100%;
        resize: vertical;
        transition: border-color 0.15s, background 0.15s;
      }
      .editable-textarea { min-height: 54px; field-sizing: content; }
      .editable-input:hover, .editable-textarea:hover { border-color: var(--w-border-2); background: var(--w-surface); }
      .editable-input:focus, .editable-textarea:focus { outline: none; border-color: var(--w-accent); background: var(--w-surface); }

      .risk-select {
        background: var(--w-surface);
        border: 1px solid var(--w-accent);
        border-radius: 3px;
        color: var(--w-text);
        font-size: 12px;
        padding: 2px 5px;
        width: 100%;
      }

      .audit-empty {
        color: var(--w-text-3);
        font-size: 12px;
        padding: 10px 14px;
      }

      /* ── PBC items table (step 3) ─────────────────────────────────────── */
      .pbc-table {
        width: 100%;
        min-width: 680px;
        border-collapse: collapse;
        font-size: 12px;
      }
      .pbc-table th {
        background: var(--w-surface);
        border-bottom: 1px solid var(--w-border);
        color: var(--w-text-3);
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.05em;
        padding: 6px 10px;
        text-align: left;
        text-transform: uppercase;
      }
      .pbc-table th.center { text-align: center; }
      .pbc-table td {
        border-bottom: 1px solid var(--w-border);
        padding: 6px 10px;
        vertical-align: middle;
        color: var(--w-text);
      }
      .pbc-table tr:last-child td { border-bottom: none; }
      .pbc-table tr.approved td  { background: rgba(23,136,86,0.04); }

      .pbc-num-cell {
        font-family: var(--mono);
        font-size: 10.5px;
        color: var(--w-text-3);
        width: 32px;
        border-left: 2px solid transparent;
        vertical-align: top !important;
        padding-top: 8px !important;
      }
      .pbc-table tr.approved .pbc-num-cell { border-left-color: #178856; }

      .pbc-name-cell  { width: 18%; font-weight: 500; }
      .pbc-type-cell  { width: 90px; }
      .pbc-scope-cell { width: 90px; text-align: center; }
      .pbc-ok-cell    { width: 52px; text-align: center; }

      .pbc-type-inner { display: flex; flex-direction: column; gap: 3px; }

      .pbc-cell-input {
        width: 100%;
        border: none;
        background: transparent;
        font-family: var(--font);
        font-size: 12px;
        color: var(--w-text-1);
        outline: none;
        padding: 0;
        min-width: 0;
      }
      .pbc-cell-input-sm {
        width: 100%;
        border: none;
        background: transparent;
        font-family: var(--font);
        font-size: 11.5px;
        color: var(--w-text-2);
        outline: none;
        padding: 0;
        min-width: 0;
      }
      .pbc-type-select {
        border: none;
        background: transparent;
        font-family: var(--font);
        font-size: 10.5px;
        font-weight: 600;
        color: var(--w-text-1);
        outline: none;
        cursor: pointer;
        padding: 0;
        width: 100%;
      }
      .pbc-source-input {
        width: 100%;
        border: none;
        background: transparent;
        font-family: var(--mono);
        font-size: 10px;
        color: var(--w-text-3);
        outline: none;
        padding: 0;
      }
      .pbc-fields-input {
        width: 100%;
        border: none;
        background: transparent;
        font-family: var(--mono);
        font-size: 10.5px;
        color: var(--w-text-2);
        outline: none;
        padding: 0;
        min-width: 0;
      }
      .pbc-scope-input {
        width: 100%;
        border: none;
        background: transparent;
        font-family: var(--font);
        font-size: 11px;
        color: var(--w-text-3);
        outline: none;
        padding: 0;
        text-align: center;
      }

      /* Focus indicator: highlight the table cell when any pbc input inside it is focused */
      .pbc-table td:has(.pbc-cell-input:focus),
      .pbc-table td:has(.pbc-cell-input-sm:focus),
      .pbc-table td:has(.pbc-fields-input:focus),
      .pbc-table td:has(.pbc-scope-input:focus),
      .pbc-table td:has(.pbc-source-input:focus) {
        outline: 1px solid var(--w-accent);
        outline-offset: -1px;
        background: var(--w-accent-dim);
      }
      .pbc-table td:has(.pbc-type-select:focus) {
        outline: 1px solid var(--w-accent);
        outline-offset: -1px;
        background: var(--w-accent-dim);
      }
      .pbc-ok-inner {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
      }
      .pbc-ok-btn {
        width: 22px;
        height: 22px;
        border-radius: 4px;
        border: 0.5px solid var(--w-border-2);
        background: transparent;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--w-text-3);
        flex-shrink: 0;
        padding: 0;
      }
      .pbc-ok-btn.checked       { border-color: #178856; background: #178856; color: #fff; }
      .pbc-ok-btn:disabled      { cursor: default; }
      .pbc-del-btn {
        width: 18px;
        height: 18px;
        border-radius: 3px;
        border: none;
        background: transparent;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--w-text-3);
        flex-shrink: 0;
        padding: 0;
      }

      /* ── Audit section prompt ────────────────────────────────────────── */
      .audit-section-prompt {
        padding: 10px 14px 14px;
        border-top: 1px solid var(--w-border);
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .audit-section-prompt-label {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--w-text-3);
      }
      .audit-section-prompt-row {
        display: flex;
        gap: 6px;
        align-items: flex-end;
      }
      .audit-section-prompt-textarea {
        flex: 1;
        min-height: 52px;
        field-sizing: content;
        background: var(--w-surface);
        border: 1px solid var(--w-border-2);
        border-radius: 4px;
        color: var(--w-text);
        font-family: var(--font);
        font-size: 12px;
        line-height: 1.5;
        padding: 7px 10px;
        resize: none;
        box-sizing: border-box;
        transition: border-color 0.15s;
      }
      .audit-section-prompt-textarea:focus {
        outline: none;
        border-color: var(--w-accent);
      }
      .audit-section-prompt-textarea::placeholder {
        color: var(--w-text-3);
      }
      .audit-section-send-btn {
        flex-shrink: 0;
        width: 34px;
        height: 34px;
        border-radius: 4px;
        border: none;
        background: var(--w-accent);
        color: #fff;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.15s;
      }
      .audit-section-send-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      /* Add / delete control */
      .add-control-btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 4px 10px;
        font-size: 11px;
        font-family: var(--font);
        border-radius: 4px;
        border: 0.5px dashed var(--w-border-2);
        background: transparent;
        color: var(--w-text-3);
        cursor: pointer;
        transition: color 0.15s, border-color 0.15s;
      }
      .add-control-btn:hover {
        color: var(--w-text-2);
        border-color: var(--w-accent);
      }
      .ctrl-action {
        width: 28px;
        text-align: center;
        padding: 0 2px;
      }
      .ctrl-delete-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 3px;
        border: none;
        background: transparent;
        color: var(--w-text-3);
        cursor: pointer;
        border-radius: 3px;
        opacity: 0.4;
        transition: opacity 0.15s, color 0.15s;
      }
      .ctrl-delete-btn:hover {
        opacity: 1;
        color: #c0392b;
      }
      .audit-ai-error {
        font-size: 11px;
        color: #c0392b;
        padding: 4px 0;
      }
      .audit-ai-ok {
        font-size: 11px;
        color: var(--w-success, #2e7d45);
        padding: 4px 0;
      }
      .audit-ai-response {
        background: var(--w-surface);
        border: 1px solid var(--w-border-2);
        border-radius: 4px;
        padding: 10px 12px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .audit-ai-response-label {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--w-accent);
      }
      .audit-ai-response-text {
        font-size: 12px;
        line-height: 1.6;
        color: var(--w-text);
        white-space: pre-wrap;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* ── Model pull banner ───────────────────────────────────────────── */
      .model-pull-banner {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 2rem;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        font-size: 0.8125rem;
        color: var(--blue);
      }
      .model-pull-banner--error { color: var(--accent); }
      .model-pull-label { white-space: nowrap; flex-shrink: 0; }
      .model-pull-track {
        flex: 1;
        height: 4px;
        border-radius: 2px;
        background: var(--border);
        overflow: hidden;
        min-width: 80px;
        max-width: 260px;
      }
      .model-pull-fill {
        height: 100%;
        background: var(--blue);
        border-radius: 2px;
        transition: width 0.4s ease;
      }
      .model-pull-pct {
        font-size: 0.75rem;
        color: var(--text-muted);
        white-space: nowrap;
        flex-shrink: 0;
        min-width: 3ch;
        text-align: right;
      }

      /* ── Audit setup step 1 ─────────────────────────────────────────── */
      @keyframes blink { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 1; } }

      .audit-top-bar {
        display: flex; align-items: center;
        padding: 10px 14px;
        border-bottom: 1px solid var(--w-border);
        flex-shrink: 0;
      }
      .audit-step-trail { display: flex; align-items: center; gap: 8px; }
      .audit-step-crumb { display: flex; align-items: center; gap: 5px; }
      .audit-step-num {
        width: 20px; height: 20px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 11px; font-weight: 500; flex-shrink: 0;
      }
      .audit-step-num.done { background: var(--w-success); color: #fff; }
      .audit-step-num.active { background: transparent; border: 1.5px solid var(--w-success); color: var(--w-success); }
      .audit-step-num.pending { background: var(--w-surface-2); color: var(--w-text-3); border: 0.5px solid var(--w-border); }
      .audit-step-label { font-size: 12px; }
      .audit-step-label.active { color: var(--w-text); font-weight: 500; }
      .audit-step-label.muted { color: var(--w-text-3); }
      .audit-step-sep { color: var(--w-text-4); font-size: 11px; }

      .audit-setup-content { flex: 1; overflow-y: auto; padding: 14px; }
      .audit-setup-header { margin-bottom: 14px; }
      .audit-setup-header h1 { font-size: 16px; font-weight: 500; color: var(--w-text); margin-bottom: 3px; }
      .audit-setup-header p { font-size: 12px; color: var(--w-text-3); line-height: 1.5; }
      .audit-setup-section { margin-bottom: 14px; }
      .audit-setup-label {
        font-size: 10px; font-weight: 600; color: var(--w-text-3);
        text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px;
      }

      .sop-file-zone {
        border: 1px dashed var(--w-border-2); border-radius: var(--radius);
        padding: 20px; text-align: center; cursor: pointer; transition: background 0.15s;
      }
      .sop-file-zone:hover { background: var(--w-surface-2); }
      .sop-file-zone.has-file { border-style: solid; border-color: var(--w-success); background: var(--w-surface-2); }

      .audit-std-grid { display: flex; flex-wrap: wrap; gap: 6px; }
      .audit-std-chip {
        display: flex; align-items: center; gap: 5px;
        padding: 5px 11px; border-radius: 20px;
        border: 0.5px solid var(--w-border-2);
        font-size: 12px; cursor: pointer; user-select: none;
        background: var(--w-surface); color: var(--w-text-3); transition: all 0.15s;
      }
      .audit-std-chip:hover { border-color: var(--w-success); color: var(--w-text); }
      .audit-std-chip.selected { border-color: var(--w-success); background: var(--w-success); color: #fff; }
      .audit-std-chip .chip-check { opacity: 0; transition: opacity 0.1s; }
      .audit-std-chip.selected .chip-check { opacity: 1; }

      .audit-add-row { display: flex; gap: 8px; margin-top: 8px; }
      .audit-add-input {
        flex: 1; padding: 6px 10px; font-size: 12px;
        border: 0.5px solid var(--w-border-2); border-radius: var(--radius-sm);
        background: var(--w-surface); color: var(--w-text); font-family: var(--font);
      }
      .audit-add-input:focus { outline: none; border-color: var(--w-success); }
      .audit-add-input:disabled { opacity: 0.4; }
      .audit-btn-add {
        padding: 6px 12px; font-size: 12px; border-radius: var(--radius-sm);
        border: 0.5px solid var(--w-success); color: var(--w-success);
        background: transparent; cursor: pointer; font-family: var(--font);
      }
      .audit-btn-add:hover { background: var(--w-success); color: #fff; }
      .audit-btn-add:disabled { opacity: 0.4; cursor: not-allowed; }

      .audit-scope-list { display: flex; flex-direction: column; gap: 5px; }
      .audit-scope-item {
        display: flex; align-items: center; gap: 8px;
        padding: 7px 10px; border-radius: var(--radius-sm);
        border: 0.5px solid var(--w-border); background: var(--w-surface-2);
        font-size: 12px; color: var(--w-text);
      }
      .audit-scope-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--w-success); flex-shrink: 0; }
      .audit-scope-remove {
        margin-left: auto; cursor: pointer; color: var(--w-text-3);
        background: none; border: none; font-size: 15px; line-height: 1; padding: 0 2px;
      }
      .audit-scope-remove:hover { color: #f87171; }
      .audit-scope-remove:disabled { opacity: 0.3; cursor: not-allowed; }

      .audit-ai-box { border: 0.5px solid var(--w-border-2); border-radius: var(--radius); overflow: hidden; margin-bottom: 14px; }
      .audit-ai-header {
        display: flex; align-items: center; gap: 8px; padding: 9px 12px;
        background: var(--w-surface-2); border-bottom: 0.5px solid var(--w-border);
        font-size: 11px; color: var(--w-text-3);
      }
      .audit-ai-dot {
        width: 14px; height: 14px; border-radius: 50%; background: var(--w-success);
        display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      }
      .audit-ai-input-row { display: flex; align-items: center; }
      .audit-ai-textarea {
        flex: 1; padding: 9px 12px; font-size: 12px;
        border: none; background: transparent; color: var(--w-text);
        font-family: var(--font); resize: none; outline: none;
      }
      .audit-ai-send {
        margin: 5px; padding: 5px 12px; font-size: 12px; border-radius: var(--radius-sm);
        border: none; background: var(--w-success); color: #fff;
        cursor: pointer; font-family: var(--font);
        display: flex; align-items: center; gap: 5px; white-space: nowrap;
      }
      .audit-ai-send:disabled { background: var(--w-surface-2); color: var(--w-text-3); cursor: not-allowed; }
      .audit-ai-response { border-top: 0.5px solid var(--w-border); padding: 10px 12px; font-size: 12px; line-height: 1.6; color: var(--w-text-3); }
      .audit-applied-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--w-success); margin-top: 5px; }

      .audit-approval-bar {
        flex-shrink: 0; padding: 12px 14px;
        border-top: 1px solid var(--w-border); background: var(--w-surface-2);
        display: flex; align-items: center; justify-content: space-between; gap: 10px;
      }
      .audit-approval-label { display: flex; align-items: flex-start; gap: 8px; font-size: 12px; color: var(--w-text-3); line-height: 1.5; flex: 1; min-width: 0; }
      .audit-approval-label strong { color: var(--w-text); display: block; font-weight: 500; font-size: 13px; }
      .audit-checkbox-wrap { display: flex; align-items: center; gap: 7px; cursor: pointer; flex-shrink: 0; }
      .audit-checkbox {
        width: 16px; height: 16px; border-radius: 4px;
        border: 1.5px solid var(--w-border-2);
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0; transition: all 0.15s; cursor: pointer;
      }
      .audit-checkbox.checked { background: var(--w-success); border-color: var(--w-success); }
      .audit-proceed-btn {
        padding: 7px 16px; font-size: 12px; border-radius: var(--radius-sm);
        border: none; background: var(--w-success); color: #fff;
        cursor: pointer; font-family: var(--font); font-weight: 500;
        display: flex; align-items: center; gap: 7px; flex-shrink: 0;
      }
      .audit-proceed-btn:disabled { background: var(--w-surface-2); color: var(--w-text-3); cursor: not-allowed; }
      .audit-proceed-btn:not(:disabled):hover { filter: brightness(1.1); }


      /* ── Step 4 — Data collection ─────────────────────────────────────────── */
      .s4-header { flex-shrink:0; padding:14px 14px 10px; border-bottom:1px solid var(--w-border); background:var(--w-surface-2); }
      .s4-badge { display:inline-flex; align-items:center; padding:2px 9px; border-radius:10px; font-size:10px; font-weight:600; background:var(--w-surface-2); border:0.5px solid var(--w-border-2); color:var(--w-text-3); }
      .s4-title { font-size:15px; font-weight:500; color:var(--w-text); }
      .s4-subtitle { font-size:12px; color:var(--w-text-3); margin-top:3px; }

      .s4-tab-row { display:flex; flex-shrink:0; border-bottom:0.5px solid var(--w-border); background:var(--w-surface); }
      .s4-tab { padding:9px 18px; font-size:12px; font-weight:500; color:var(--w-text-3); cursor:pointer; border-bottom:2px solid transparent; background:none; border-top:none; border-left:none; border-right:none; font-family:var(--font); transition:color 0.12s; }
      .s4-tab:hover { color:var(--w-text); }
      .s4-tab--active { color:var(--w-text); border-bottom-color:var(--w-accent); }

      .s4-drop-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
      .s4-drop-zone { border:1.5px dashed var(--w-border-2); border-radius:var(--radius); padding:28px 16px; text-align:center; cursor:pointer; transition:border-color 0.15s, background 0.15s; display:block; }
      .s4-drop-zone:hover { border-color:var(--w-accent); background:var(--w-accent-dim); }
      .s4-drop-zone--over { border-color:var(--w-accent) !important; background:var(--w-accent-dim) !important; }
      .s4-drop-icon { font-size:24px; margin-bottom:8px; }
      .s4-drop-label { font-size:13px; font-weight:500; color:var(--w-text); margin-bottom:3px; }
      .s4-drop-hint { font-size:11px; color:var(--w-text-3); }
      .s4-drop-ext { font-size:10px; color:var(--w-text-4); margin-top:6px; }

      .s4-uploading { font-size:12px; color:var(--w-text-3); margin-bottom:10px; display:flex; align-items:center; gap:6px; }

      .s4-file-list { margin-bottom:14px; }
      .s4-file-item { display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:var(--radius-sm); border:0.5px solid var(--w-border); background:var(--w-surface-2); margin-bottom:5px; cursor:pointer; transition:border-color 0.12s; }
      .s4-file-item:hover { border-color:var(--w-border-2); }
      .s4-file-item--active { border-color:var(--w-accent); background:var(--w-accent-dim); }
      .s4-file-icon { font-size:14px; flex-shrink:0; }
      .s4-file-info { flex:1; min-width:0; }
      .s4-file-name { font-size:13px; font-weight:500; color:var(--w-text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
      .s4-file-meta { font-size:11px; color:var(--w-text-4); margin-top:1px; }
      .s4-file-badge-mapped  { font-size:10px; padding:2px 7px; border-radius:10px; background:rgba(23,136,86,0.12); color:#4ade80; border:0.5px solid rgba(23,136,86,0.3); white-space:nowrap; flex-shrink:0; }
      .s4-file-badge-mapping { font-size:10px; padding:2px 7px; border-radius:10px; background:rgba(250,204,21,0.12); color:#fbbf24; border:0.5px solid rgba(250,204,21,0.3); white-space:nowrap; flex-shrink:0; }
      .s4-file-badge-pending { font-size:10px; padding:2px 7px; border-radius:10px; background:var(--w-surface-2); color:var(--w-text-4); border:0.5px solid var(--w-border); white-space:nowrap; flex-shrink:0; }

      .s4-col-map-panel { border:0.5px solid var(--w-border-2); border-radius:var(--radius); overflow:hidden; }
      .s4-col-map-head { padding:8px 12px; background:var(--w-surface-2); border-bottom:0.5px solid var(--w-border); font-size:11px; font-weight:600; color:var(--w-text-3); text-transform:uppercase; letter-spacing:0.05em; }
      .s4-col-map-grid-header { display:grid; grid-template-columns:1fr 1fr; padding:5px 12px; background:var(--w-surface); border-bottom:0.5px solid var(--w-border); font-size:10px; font-weight:600; color:var(--w-text-4); text-transform:uppercase; letter-spacing:0.04em; }
      .s4-col-map-row { display:grid; grid-template-columns:1fr 1fr; align-items:center; padding:5px 12px; border-bottom:0.5px solid var(--w-border); gap:8px; }
      .s4-col-map-row:last-child { border-bottom:none; }
      .s4-col-map-src { font-size:12px; color:var(--w-text-2); font-family:var(--mono, monospace); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
      .s4-col-map-select { background:var(--w-surface); border:0.5px solid var(--w-border-2); border-radius:3px; color:var(--w-text); font-size:11px; font-family:var(--font); outline:none; padding:3px 6px; width:100%; transition:border-color 0.12s; }
      .s4-col-map-select:focus { border-color:var(--w-accent); }
      .s4-remap-btn { display:flex; align-items:center; gap:5px; padding:3px 9px; border-radius:3px; border:0.5px solid var(--w-border-2); background:transparent; color:var(--w-text-3); font-size:11px; font-family:var(--font); cursor:pointer; transition:all 0.12s; white-space:nowrap; flex-shrink:0; }
      .s4-remap-btn:hover:not(:disabled) { border-color:var(--w-text-3); color:var(--w-text); }
      .s4-remap-btn:disabled { opacity:0.4; cursor:default; }

      .s4-status-bar { flex-shrink:0; padding:10px 14px; border-top:1px solid var(--w-border); background:var(--w-surface-2); display:flex; align-items:center; gap:8px; }
      .s4-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
      .s4-dot--idle  { background:var(--w-text-4); }
      .s4-dot--ready { background:#4ade80; }
      .s4-status-text { font-size:12px; color:var(--w-text-3); }

      .s4-sql-stub { padding:40px 20px; text-align:center; font-size:13px; color:var(--w-text-4); }

      /* ── Step 4a — Algorithm review ────────────────────────────────────────── */
      .s4a-page-hdr {
        display: flex; align-items: flex-start; justify-content: space-between;
        padding: 12px 14px 10px; border-bottom: 0.5px solid var(--w-border);
        flex-shrink: 0; gap: 12px; background: var(--w-surface-2);
      }
      .s4a-hdr-left { display: flex; flex-direction: column; gap: 2px; }
      .s4a-page-step {
        font-size: 10.5px; font-weight: 500; letter-spacing: 0.06em;
        text-transform: uppercase; color: var(--w-text-3);
      }
      .s4a-page-title { font-size: 15px; font-weight: 500; color: var(--w-text); }
      .s4a-page-sub { font-size: 11.5px; color: var(--w-text-3); margin-top: 1px; }
      .s4a-page-stats { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
      .s4a-stat-item { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
      .s4a-stat-num { font-size: 17px; font-weight: 600; color: var(--w-text); line-height: 1; }
      .s4a-stat-green { color: #4ade80 !important; }
      .s4a-stat-label { font-size: 10px; color: var(--w-text-3); text-transform: uppercase; letter-spacing: 0.05em; }
      .s4a-stat-divider { width: 0.5px; height: 28px; background: var(--w-border-2); }
      .s4a-btn-gen-all {
        display: flex; align-items: center; gap: 6px;
        padding: 6px 12px; border-radius: var(--radius-sm);
        background: var(--w-surface); color: var(--w-text); border: 0.5px solid var(--w-border-2);
        font-size: 12px; font-weight: 500; cursor: pointer;
        font-family: inherit; transition: all 0.15s;
      }
      .s4a-btn-gen-all:hover:not(:disabled) { border-color: var(--w-text-3); color: var(--w-text); }
      .s4a-btn-gen-all:disabled { opacity: 0.4; cursor: default; }

      /* Control group card */
      .s4a-group-wrap {
        border: 0.5px solid var(--w-border); border-radius: var(--radius-sm);
        overflow: visible; margin-bottom: 8px; background: var(--w-surface-2);
      }
      .s4a-group-hdr {
        display: flex; align-items: center; gap: 10px;
        padding: 9px 12px; background: var(--w-surface-2);
        cursor: pointer; user-select: none;
        border-radius: var(--radius-sm); transition: background 0.1s;
      }
      .s4a-group-hdr-open {
        border-radius: var(--radius-sm) var(--radius-sm) 0 0;
        border-bottom: 0.5px solid var(--w-border);
      }
      .s4a-group-hdr:hover { background: var(--w-surface); }
      .s4a-group-chev { flex-shrink: 0; color: var(--w-text-3); transition: transform 0.15s; font-size: 11px; }
      .s4a-chev-open { transform: rotate(90deg); }
      .s4a-group-hdr-text { flex: 1; min-width: 0; }
      .s4a-group-title {
        font-size: 12.5px; font-weight: 500; color: var(--w-text);
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap; line-height: 1.3;
      }
      .s4a-meta-ref { font-size: 10.5px; font-family: monospace; color: var(--w-text-3); }
      .s4a-group-progress {
        font-size: 11px; padding: 2px 8px; border-radius: 999px;
        flex-shrink: 0; border: 0.5px solid var(--w-border);
        background: var(--w-surface-2); color: var(--w-text-3); transition: all 0.2s;
      }
      .s4a-progress-done { border-color: #178856 !important; background: rgba(74,222,128,0.12) !important; color: #4ade80 !important; }
      .s4a-group-body { border-radius: 0 0 var(--radius-sm) var(--radius-sm); overflow: hidden; }

      /* DSL table */
      .s4a-dsl-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
      .s4a-dsl-table thead tr { background: var(--w-surface-2); border-bottom: 0.5px solid var(--w-border); }
      .s4a-dsl-table th {
        padding: 5px 10px; font-size: 10.5px; font-weight: 500;
        color: var(--w-text-3); text-align: left;
        text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap;
      }
      .s4a-th-center { text-align: center; }
      .s4a-dsl-table td { padding: 0; border-bottom: 0.5px solid var(--w-border); vertical-align: top; }
      .s4a-dsl-table tr:last-child td { border-bottom: none; }
      .s4a-tr-approved { background: rgba(74,222,128,0.06); }
      .s4a-tr-rejected { background: rgba(180,0,0,0.06); opacity: 0.6; }

      /* Column widths */
      .s4a-col-num    { width: 32px; }
      .s4a-col-pbc    { width: 18%; }
      .s4a-col-dsl    { width: 42%; }
      .s4a-col-ops    { width: 16%; }
      .s4a-col-status { width: 10%; }
      .s4a-col-ok     { width: 68px; }

      .s4a-cell-pad { padding: 7px 10px; }
      .s4a-cell-num { padding: 7px 0 7px 10px; font-size: 11px; color: var(--w-text-3); font-family: monospace; }
      .s4a-pbc-name { font-size: 12px; font-weight: 500; color: var(--w-text); line-height: 1.35; }

      /* DSL textarea */
      .s4a-dsl-ta {
        width: 100%; min-height: 80px;
        padding: 7px 9px; font-family: monospace; font-size: 11px;
        line-height: 1.75; color: var(--w-text);
        background: transparent; border: none; outline: none;
        resize: vertical; transition: background 0.15s; display: block;
      }
      .s4a-dsl-ta:focus { background: rgba(96,165,250,0.04); }
      .s4a-ta-edited { background: rgba(250,204,21,0.05) !important; }

      /* Operation pills */
      .s4a-ops-cell { padding: 7px 8px; }
      .s4a-op-pill {
        display: inline-block; font-size: 10px; font-family: monospace;
        font-weight: 500; padding: 1px 6px; border-radius: 3px;
        margin: 1px 2px 1px 0; letter-spacing: 0.02em;
      }
      .s4a-op-total   { background: rgba(96,165,250,0.12);  color: #60a5fa; border: 0.5px solid rgba(96,165,250,0.2); }
      .s4a-op-count   { background: rgba(96,165,250,0.12);  color: #60a5fa; border: 0.5px solid rgba(96,165,250,0.2); }
      .s4a-op-avg     { background: rgba(96,165,250,0.12);  color: #60a5fa; border: 0.5px solid rgba(96,165,250,0.2); }
      .s4a-op-pct     { background: rgba(250,204,21,0.10);  color: #facc15; border: 0.5px solid rgba(250,204,21,0.2); }
      .s4a-op-expect  { background: rgba(250,204,21,0.10);  color: #facc15; border: 0.5px solid rgba(250,204,21,0.2); }
      .s4a-op-flag    { background: rgba(248,113,113,0.10); color: #f87171; border: 0.5px solid rgba(248,113,113,0.2); }
      .s4a-op-match   { background: rgba(74,222,128,0.10);  color: #4ade80; border: 0.5px solid rgba(74,222,128,0.2); }

      /* Status badge */
      .s4a-status-cell { padding: 7px 8px; }
      .s4a-badge {
        font-size: 10.5px; padding: 2px 7px; border-radius: 999px;
        white-space: nowrap; display: inline-block;
      }
      .s4a-badge-generated { background: var(--w-surface-2); color: var(--w-text-3); border: 0.5px solid var(--w-border); }
      .s4a-badge-edited    { background: rgba(250,204,21,0.10); color: #facc15; border: 0.5px solid rgba(250,204,21,0.2); }
      .s4a-badge-approved  { background: rgba(74,222,128,0.12); color: #4ade80; border: 0.5px solid rgba(74,222,128,0.22); }
      .s4a-badge-rejected  { background: rgba(248,113,113,0.10); color: #f87171; border: 0.5px solid rgba(248,113,113,0.2); }

      /* Approve / reject buttons */
      .s4a-ok-cell { padding: 6px 8px; }
      .s4a-ok-inner { display: flex; align-items: center; justify-content: center; gap: 5px; }
      .s4a-ok-btn {
        width: 22px; height: 22px; border-radius: 4px;
        border: 0.5px solid var(--w-border-2);
        background: transparent; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        color: var(--w-text-3); transition: all 0.12s; flex-shrink: 0;
        font-size: 11px;
      }
      .s4a-ok-btn:hover { border-color: #4ade80; color: #4ade80; background: rgba(74,222,128,0.10); }
      .s4a-ok-checked { border-color: #178856 !important; background: #178856 !important; color: #fff !important; }
      .s4a-del-btn {
        width: 22px; height: 22px; border-radius: 4px;
        border: 0.5px solid var(--w-border);
        background: transparent; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        color: var(--w-text-3); transition: all 0.12s; flex-shrink: 0;
        font-size: 11px;
      }
      .s4a-del-btn:hover { border-color: #f87171; color: #f87171; background: rgba(248,113,113,0.08); }

      /* Run engine button */
      .s4a-btn-run {
        display: flex; align-items: center; gap: 7px;
        padding: 6px 14px; border-radius: var(--radius-sm);
        background: #178856; color: #fff;
        font-size: 12px; font-weight: 500; border: none; cursor: pointer;
        font-family: inherit; transition: opacity 0.15s;
        opacity: 0.35; pointer-events: none;
      }
      .s4a-btn-run-ready { opacity: 1; pointer-events: auto; }
      .s4a-btn-run-ready:hover { opacity: 0.85; }

      /* ── Step 5 — Test results ─────────────────────────────────────────────── */
      .s5-script-card { border:0.5px solid var(--w-border); border-radius:var(--radius-sm); background:var(--w-surface-2); overflow:hidden; }
      .s5-script-header { background:var(--w-surface-2); transition:background 0.1s; }
      .s5-script-header:hover { background:var(--w-surface); }
      .s5-header-pass { border-left:3px solid #4ade80; }
      .s5-header-fail { border-left:3px solid #f87171; }
      .s5-header-error { border-left:3px solid #fbbf24; }
      .s5-stmt-row { display:flex; align-items:baseline; gap:8px; padding:4px 0; font-size:12px; border-top:0.5px solid var(--w-border); }
      .s5-stmt-icon { width:16px; text-align:center; flex-shrink:0; font-size:11px; color:var(--w-text-3); }
      .s5-stmt-label { flex:1; color:var(--w-text-2); font-weight:500; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
      .s5-stmt-values { color:var(--w-text-3); font-family:monospace; font-size:11px; flex-shrink:0; }
      .s5-stmt-pass .s5-stmt-icon { color:#4ade80; }
      .s5-stmt-fail .s5-stmt-icon { color:#f87171; }
      .s5-stmt-sample .s5-stmt-icon { color:#60a5fa; }
      .s5-stmt-error .s5-stmt-icon { color:#fbbf24; }

    </style>
  </head>
